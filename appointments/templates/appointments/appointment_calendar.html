{% extends 'base.html' %}
{% load static %}
{% block title %}Appointment Calendar - Dental Clinic{% endblock %}
{% block page_title %}Appointment Calendar{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="row">
            <div class="col-md-6">
                <h5 class="mb-0">Calendar View</h5>
            </div>
            <div class="col-md-6">
                <a href="{% url 'appointments:appointment_list' %}" class="btn btn-secondary float-end">
                    <i class="bi bi-list"></i> List View
                </a>
            </div>
        </div>
    </div>
    <div class="card-body">
        <div id="calendar"></div>
    </div>
</div>

{% block extra_js %}
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css' rel='stylesheet' />
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,listWeek'
        },
        events: {{ appointments_json|safe }},
        editable: true,
        eventClick: function(info) {
            window.location.href = info.event.url;
        }
    });
    calendar.render();
});
</script>
{% endblock %}
{% endblock %}
