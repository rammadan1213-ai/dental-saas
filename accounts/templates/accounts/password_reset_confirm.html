{% extends 'base.html' %}

{% block auth_content %}
<div class="login-container">
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="bi bi-key" style="font-size: 60px; color: #667eea;"></i>
            <h3 class="mt-3">Set New Password</h3>
            <p class="text-muted">Enter your new password</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="id_password1" class="form-label">New Password</label>
                <input type="password" name="password1" class="form-control" id="id_password1" required>
            </div>
            
            <div class="mb-3">
                <label for="id_password2" class="form-label">Confirm New Password</label>
                <input type="password" name="password2" class="form-control" id="id_password2" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mb-3">
                <i class="bi bi-check-circle"></i> Change Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
