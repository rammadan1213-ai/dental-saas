{% extends 'base.html' %}

{% block page_title %}Change Password{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5 class="mb-0">Change Password</h5>
    </div>
    <div class="card-body">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="id_password1" class="form-label">New Password</label>
                <input type="password" name="password1" class="form-control" id="id_password1" required minlength="8">
            </div>
            
            <div class="mb-3">
                <label for="id_password2" class="form-label">Confirm New Password</label>
                <input type="password" name="password2" class="form-control" id="id_password2" required minlength="8">
            </div>
            
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-circle"></i> Change Password
            </button>
            
            <a href="{% url 'accounts:profile' %}" class="btn btn-secondary">
                <i bi-arrow-left></i> Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
