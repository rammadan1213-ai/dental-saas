{% extends 'base.html' %}

{% block auth_content %}
<div class="login-container">
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="bi bi-key" style="font-size: 60px; color: #667eea;"></i>
            <h3 class="mt-3">Password Reset</h3>
            <p class="text-muted">Enter your email to reset your password</p>
        </div>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="id_email" class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" id="id_email" placeholder="Enter your email">
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mb-3">
                <i class="bi bi-send"></i> Send Reset Link
            </button>
            
            <div class="text-center">
                <a href="{% url 'accounts:login' %}" class="text-muted">
                    Back to Login
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
