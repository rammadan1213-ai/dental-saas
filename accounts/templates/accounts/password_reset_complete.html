{% extends 'base.html' %}

{% block auth_content %}
<div class="login-container">
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="bi bi-check-circle-fill" style="font-size: 60px; color: #28a745;"></i>
            <h3 class="mt-3">Password Reset Complete</h3>
            <p class="text-muted">Your password has been reset successfully</p>
        </div>
        
        <div class="alert alert-success">
            <p>Your password has been set. You may go ahead and log in now.</p>
        </div>
        
        <div class="text-center">
            <a href="{% url 'accounts:login' %}" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right"></i> Log In
            </a>
        </div>
    </div>
</div>
{% endblock %}
