<style>
.navbar-custom {
    background: #fff !important;
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    padding: 16px 24px;
}

.navbar-brand-custom {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 1.25rem;
    color: #1f2937;
    text-decoration: none;
}

.navbar-brand-custom i {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: 1.5rem;
}

.navbar-brand-custom span {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.navbar-actions {
    display: flex;
    align-items: center;
    gap: 12px;
}

.nav-icon-btn {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f7fb;
    color: #6b7280;
    border: none;
    transition: var(--transition);
    position: relative;
    text-decoration: none;
}

.nav-icon-btn:hover {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
}

.nav-icon-btn .badge {
    position: absolute;
    top: -4px;
    right: -4px;
    font-size: 10px;
    padding: 3px 6px;
    border-radius: 10px;
}

.search-box {
    background: #f5f7fb;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 10px 16px;
    width: 240px;
    transition: var(--transition);
}

.search-box:focus {
    background: #fff;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    outline: none;
}

.search-dropdown {
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 8px;
    background: white;
    width: 360px;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    max-height: 450px;
    overflow-y: auto;
    z-index: 1050;
    display: none;
}

.search-dropdown.active {
    display: block;
}

.search-dropdown-section {
    padding: 12px 16px;
    border-bottom: 1px solid #f0f0f0;
}

.search-dropdown-section:last-child {
    border-bottom: none;
}

.search-dropdown-section h6 {
    font-size: 11px;
    text-transform: uppercase;
    color: #9ca3af;
    margin-bottom: 8px;
    font-weight: 600;
}

.search-dropdown-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
    color: inherit;
}

.search-dropdown-item:hover {
    background: #f5f7fb;
}

.search-dropdown-item .icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
}

.search-dropdown-item .icon.patient { background: #e0e7ff; color: #4f46e5; }
.search-dropdown-item .icon.treatment { background: #dcfce7; color: #16a34a; }
.search-dropdown-item .icon.invoice { background: #fef3c7; color: #d97706; }
.search-dropdown-item .icon.appointment { background: #fce7f3; color: #db2777; }
.search-dropdown-item .icon.clinic { background: #e0f2fe; color: #0284c7; }

.search-dropdown-item .details {
    flex: 1;
    min-width: 0;
}

.search-dropdown-item .title {
    font-weight: 500;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.search-dropdown-item .subtitle {
    font-size: 12px;
    color: #6b7280;
}

.search-dropdown-loading {
    padding: 24px;
    text-align: center;
    color: #6b7280;
}

.search-dropdown-empty {
    padding: 24px;
    text-align: center;
    color: #9ca3af;
}

.user-dropdown .dropdown-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 14px 6px 6px;
    background: #f5f7fb;
    border-radius: 30px;
    border: 1px solid #e5e7eb;
    transition: var(--transition);
}

.user-dropdown .dropdown-toggle:hover {
    border-color: var(--primary-color);
    background: #fff;
}

.user-dropdown .dropdown-toggle::after {
    display: none;
}

.user-dropdown .user-avatar-sm {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 600;
    font-size: 13px;
}

.user-dropdown .user-name {
    font-weight: 500;
    color: #1f2937;
}

.user-dropdown .dropdown-menu {
    border: none;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    border-radius: 12px;
    padding: 8px;
    min-width: 220px;
    margin-top: 12px !important;
}

.user-dropdown .dropdown-item {
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 4px;
    transition: var(--transition);
}

.user-dropdown .dropdown-item:hover {
    background: #f5f7fb;
}

.user-dropdown .dropdown-item i {
    width: 20px;
    color: #6b7280;
}

.user-dropdown .dropdown-divider {
    margin: 8px 0;
    border-color: #f3f4f6;
}

.quick-actions {
    display: flex;
    gap: 10px;
}

.btn-quick-action {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    font-weight: 500;
    transition: var(--transition);
}

.btn-quick-action:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.35);
    color: #fff;
}

.mobile-toggle {
    display: none;
    width: 42px;
    height: 42px;
    border-radius: 10px;
    align-items: center;
    justify-content: center;
    background: #f5f7fb;
    border: none;
    font-size: 1.25rem;
}

@media (max-width: 1024px) {
    .mobile-toggle {
        display: flex;
    }
    
    .quick-actions {
        display: none;
    }
    
    .search-box {
        width: 180px;
    }
}

@media (max-width: 768px) {
    .user-dropdown .user-name {
        display: none;
    }
    
    .search-box {
        width: 140px;
    }
}
</style>

<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container-fluid px-4">
        <button class="mobile-toggle me-3" id="sidebarToggle">
            <i class="bi bi-list"></i>
        </button>
        
        <a class="navbar-brand-custom" href="{% url 'dashboard:home' %}">
            <i class="bi bi-plus-circle-fill"></i>
            <span>Dental SaaS</span>
        </a>
        
        <div class="quick-actions d-none d-lg-flex mx-auto">
            <a href="{% url 'patients:patient_create' %}" class="btn btn-quick-action">
                <i class="bi bi-person-plus me-2"></i>
                New Patient
            </a>
            <a href="{% url 'appointments:appointment_create' %}" class="btn btn-quick-action">
                <i class="bi bi-calendar-plus me-2"></i>
                New Appointment
            </a>
        </div>
        
        <div class="navbar-actions">
            <div style="position: relative;">
                <input type="search" id="globalSearchInput" class="search-box" placeholder="Search patients, appointments...">
                <div id="globalSearchResults" class="search-dropdown"></div>
            </div>
            
            <button class="nav-icon-btn" onclick="toggleDarkMode()" title="Toggle Dark Mode">
                <i class="bi bi-moon-fill"></i>
            </button>
            
            <a href="{% url 'notifications:notification_list' %}" class="nav-icon-btn">
                <i class="bi bi-bell"></i>
                {% if unread_notifications_count > 0 %}
                <span class="badge bg-danger">{{ unread_notifications_count }}</span>
                {% endif %}
            </a>
            
            <div class="dropdown user-dropdown">
                <button class="dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    <div class="user-avatar-sm">
                        {{ user.first_name|slice:":1"|upper }}{{ user.last_name|slice:":1"|upper }}
                    </div>
                    <span class="user-name">{{ user.get_full_name|default:user.username }}</span>
                    <i class="bi bi-chevron-down ms-1 text-muted"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <div class="px-3 py-2">
                            <strong>{{ user.get_full_name|default:user.username }}</strong>
                            <br>
                            <small class="text-muted">{{ user.email }}</small>
                            <br>
                            <span class="badge bg-primary mt-1">{{ user.get_role_display }}</span>
                        </div>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item" href="{% url 'accounts:profile' %}">
                            <i class="bi bi-person me-2"></i>
                            My Profile
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item" href="{% url 'clinics:subscription_manage' %}">
                            <i class="bi bi-credit-card me-2"></i>
                            Subscription
                        </a>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item text-danger" href="{% url 'accounts:logout' %}">
                            <i class="bi bi-box-arrow-left me-2"></i>
                            Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</nav>

<script>
document.getElementById('sidebarToggle')?.addEventListener('click', function() {
    document.querySelector('.sidebar').classList.toggle('active');
});

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

let globalSearchTimeout = null;
const globalSearchInput = document.getElementById('globalSearchInput');
const globalSearchResults = document.getElementById('globalSearchResults');

if (globalSearchInput) {
    globalSearchInput.addEventListener('input', function(e) {
        clearTimeout(globalSearchTimeout);
        const query = e.target.value.trim();
        
        if (query.length < 2) {
            globalSearchResults.classList.remove('active');
            globalSearchResults.innerHTML = '';
            return;
        }
        
        globalSearchTimeout = setTimeout(() => {
            globalSearchResults.innerHTML = '<div class="search-dropdown-loading"><div class="spinner-border spinner-border-sm me-2"></div>Searching...</div>';
            globalSearchResults.classList.add('active');
            
            fetch(`/api/search/?q=${encodeURIComponent(query)}`, {
                credentials: 'same-origin',
                headers: { 
                    'X-CSRFToken': getCookie('csrftoken'),
                    'Accept': 'application/json',
                }
            })
            .then(res => {
                console.log('Status:', res.status);
                return res.json();
            })
            .then(data => {
                console.log('Search response:', data);
                if (data.error) {
                    globalSearchResults.innerHTML = '<div class="search-dropdown-empty">Please log in to search</div>';
                    return;
                }
                
                let html = '';
                let hasResults = false;
                
                // Patients
                if (data.patients && data.patients.length) {
                    hasResults = true;
                    html += `<div class="search-dropdown-section">
                        <h6><i class="bi bi-people me-1"></i>Patients</h6>`;
                    data.patients.forEach(p => {
                        html += `<a href="/patients/${p.id}/" class="search-dropdown-item">
                            <div class="icon patient"><i class="bi bi-person"></i></div>
                            <div class="details">
                                <div class="title">${p.full_name}</div>
                                <div class="subtitle">${p.phone || 'No phone'}</div>
                            </div>
                        </a>`;
                    });
                    html += '</div>';
                }
                
                // Treatments
                if (data.treatments && data.treatments.length) {
                    hasResults = true;
                    html += `<div class="search-dropdown-section">
                        <h6><i class="bi bi-activity me-1"></i>Treatments</h6>`;
                    data.treatments.forEach(t => {
                        html += `<a href="/treatments/${t.id}/" class="search-dropdown-item">
                            <div class="icon treatment"><i class="bi bi-clipboard-pulse"></i></div>
                            <div class="details">
                                <div class="title">${t.procedure}</div>
                                <div class="subtitle">${t.patient_name || ''}</div>
                            </div>
                        </a>`;
                    });
                    html += '</div>';
                }
                
                // Invoices
                if (data.invoices && data.invoices.length) {
                    hasResults = true;
                    html += `<div class="search-dropdown-section">
                        <h6><i class="bi bi-receipt me-1"></i>Invoices</h6>`;
                    data.invoices.forEach(i => {
                        html += `<a href="/billing/invoices/${i.id}/" class="search-dropdown-item">
                            <div class="icon invoice"><i class="bi bi-file-text"></i></div>
                            <div class="details">
                                <div class="title">${i.invoice_number}</div>
                                <div class="subtitle">$${i.amount} - ${i.status}</div>
                            </div>
                        </a>`;
                    });
                    html += '</div>';
                }
                
                // Appointments
                if (data.appointments && data.appointments.length) {
                    hasResults = true;
                    html += `<div class="search-dropdown-section">
                        <h6><i class="bi bi-calendar-check me-1"></i>Appointments</h6>`;
                    data.appointments.forEach(a => {
                        html += `<a href="/appointments/${a.id}/" class="search-dropdown-item">
                            <div class="icon appointment"><i class="bi bi-calendar"></i></div>
                            <div class="details">
                                <div class="title">${a.reason || 'Appointment'}</div>
                                <div class="subtitle">${a.date} - ${a.status}</div>
                            </div>
                        </a>`;
                    });
                    html += '</div>';
                }
                
                // Clinics (superuser)
                if (data.clinics && data.clinics.length) {
                    hasResults = true;
                    html += `<div class="search-dropdown-section">
                        <h6><i class="bi bi-hospital me-1"></i>Clinics</h6>`;
                    data.clinics.forEach(c => {
                        html += `<a href="/accounts/clinic/${c.id}/" class="search-dropdown-item">
                            <div class="icon clinic"><i class="bi bi-building"></i></div>
                            <div class="details">
                                <div class="title">${c.name}</div>
                                <div class="subtitle">${c.email || ''}</div>
                            </div>
                        </a>`;
                    });
                    html += '</div>';
                }
                
                if (!hasResults) {
                    html = '<div class="search-dropdown-empty">No results found</div>';
                }
                
                globalSearchResults.innerHTML = html;
            })
            .catch(() => {
                globalSearchResults.innerHTML = '<div class="search-dropdown-empty">Search error</div>';
            });
        }, 300);
    });
    
    // Close on click outside
    document.addEventListener('click', function(e) {
        if (!globalSearchInput.contains(e.target) && !globalSearchResults.contains(e.target)) {
            globalSearchResults.classList.remove('active');
        }
    });
}
</script>
