<style>
.navbar-custom {
    background: #fff !important;
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    padding: 16px 24px;
}

.navbar-brand-custom {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 1.25rem;
    color: #1f2937;
    text-decoration: none;
}

.navbar-brand-custom i {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: 1.5rem;
}

.navbar-brand-custom span {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.navbar-actions {
    display: flex;
    align-items: center;
    gap: 12px;
}

.nav-icon-btn {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f7fb;
    color: #6b7280;
    border: none;
    transition: var(--transition);
    position: relative;
    text-decoration: none;
}

.nav-icon-btn:hover {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
}

.nav-icon-btn .badge {
    position: absolute;
    top: -4px;
    right: -4px;
    font-size: 10px;
    padding: 3px 6px;
    border-radius: 10px;
}

.search-box {
    background: #f5f7fb;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 10px 16px;
    width: 240px;
    transition: var(--transition);
}

.search-box:focus {
    background: #fff;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    outline: none;
}

.user-dropdown .dropdown-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 14px 6px 6px;
    background: #f5f7fb;
    border-radius: 30px;
    border: 1px solid #e5e7eb;
    transition: var(--transition);
}

.user-dropdown .dropdown-toggle:hover {
    border-color: var(--primary-color);
    background: #fff;
}

.user-dropdown .dropdown-toggle::after {
    display: none;
}

.user-dropdown .user-avatar-sm {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 600;
    font-size: 13px;
}

.user-dropdown .user-name {
    font-weight: 500;
    color: #1f2937;
}

.user-dropdown .dropdown-menu {
    border: none;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    border-radius: 12px;
    padding: 8px;
    min-width: 220px;
    margin-top: 12px !important;
}

.user-dropdown .dropdown-item {
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 4px;
    transition: var(--transition);
}

.user-dropdown .dropdown-item:hover {
    background: #f5f7fb;
}

.user-dropdown .dropdown-item i {
    width: 20px;
    color: #6b7280;
}

.user-dropdown .dropdown-divider {
    margin: 8px 0;
    border-color: #f3f4f6;
}

.quick-actions {
    display: flex;
    gap: 10px;
}

.btn-quick-action {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    font-weight: 500;
    transition: var(--transition);
}

.btn-quick-action:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.35);
    color: #fff;
}

.mobile-toggle {
    display: none;
    width: 42px;
    height: 42px;
    border-radius: 10px;
    align-items: center;
    justify-content: center;
    background: #f5f7fb;
    border: none;
    font-size: 1.25rem;
}

@media (max-width: 1024px) {
    .mobile-toggle {
        display: flex;
    }
    
    .quick-actions {
        display: none;
    }
    
    .search-box {
        width: 180px;
    }
}

@media (max-width: 768px) {
    .user-dropdown .user-name {
        display: none;
    }
    
    .search-box {
        width: 140px;
    }
}
</style>

<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container-fluid px-4">
        <button class="mobile-toggle me-3" id="sidebarToggle">
            <i class="bi bi-list"></i>
        </button>
        
        <a class="navbar-brand-custom" href="{% url 'dashboard:home' %}">
            <i class="bi bi-plus-circle-fill"></i>
            <span>Dental SaaS</span>
        </a>
        
        <div class="quick-actions d-none d-lg-flex mx-auto">
            <a href="{% url 'patients:patient_create' %}" class="btn btn-quick-action">
                <i class="bi bi-person-plus me-2"></i>
                New Patient
            </a>
            <a href="{% url 'appointments:appointment_create' %}" class="btn btn-quick-action">
                <i class="bi bi-calendar-plus me-2"></i>
                New Appointment
            </a>
        </div>
        
        <div class="navbar-actions">
            <input type="search" class="search-box" placeholder="Search patients, appointments...">
            
            <button class="nav-icon-btn" onclick="toggleDarkMode()" title="Toggle Dark Mode">
                <i class="bi bi-moon-fill"></i>
            </button>
            
            <a href="{% url 'notifications:notification_list' %}" class="nav-icon-btn">
                <i class="bi bi-bell"></i>
                {% if unread_notifications_count > 0 %}
                <span class="badge bg-danger">{{ unread_notifications_count }}</span>
                {% endif %}
            </a>
            
            <div class="dropdown user-dropdown">
                <button class="dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    <div class="user-avatar-sm">
                        {{ user.first_name|slice:":1"|upper }}{{ user.last_name|slice:":1"|upper }}
                    </div>
                    <span class="user-name">{{ user.get_full_name|default:user.username }}</span>
                    <i class="bi bi-chevron-down ms-1 text-muted"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <div class="px-3 py-2">
                            <strong>{{ user.get_full_name|default:user.username }}</strong>
                            <br>
                            <small class="text-muted">{{ user.email }}</small>
                            <br>
                            <span class="badge bg-primary mt-1">{{ user.get_role_display }}</span>
                        </div>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item" href="{% url 'accounts:profile' %}">
                            <i class="bi bi-person me-2"></i>
                            My Profile
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item" href="{% url 'clinics:subscription_manage' %}">
                            <i class="bi bi-credit-card me-2"></i>
                            Subscription
                        </a>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item text-danger" href="{% url 'accounts:logout' %}">
                            <i class="bi bi-box-arrow-left me-2"></i>
                            Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</nav>

<script>
document.getElementById('sidebarToggle')?.addEventListener('click', function() {
    document.querySelector('.sidebar').classList.toggle('active');
});

document.querySelector('.search-box')?.addEventListener('keyup', function(e) {
    if (e.key === 'Enter') {
        const query = this.value.trim();
        if (query.length >= 2) {
            window.location.href = `/patients/?search=${encodeURIComponent(query)}`;
        }
    }
});
</script>
